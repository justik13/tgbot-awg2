<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>just1kbot Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-xl p-4 pb-20">
        <header class="mb-5 flex items-center justify-between">
            <div><p class="text-sm text-cyan-300">🔐 just1kbot</p><h1 class="text-2xl font-bold">Мои устройства</h1></div>
            <button id="refresh-button" class="rounded-full bg-slate-800 px-3 py-2">↻</button>
        </header>

        <section id="subscription-card" class="mb-4 rounded-3xl border border-cyan-500/20 bg-slate-900 p-5 shadow-lg shadow-cyan-950/30"></section>
        <section class="mb-4 flex items-center justify-between"><h2 id="devices-title" class="text-lg font-semibold">Устройства</h2><span id="limit-pill" class="rounded-full bg-slate-800 px-3 py-1 text-sm"></span></section>
        <div id="empty-state" class="hidden rounded-3xl border border-dashed border-slate-700 bg-slate-900/70 p-8 text-center"><div class="mb-3 text-5xl">📱</div><h3 class="text-xl font-semibold">У вас пока нет устройств</h3><p class="mt-2 text-slate-400">Создайте первое устройство, чтобы подключиться к VPN.</p></div>
        <div id="device-cards" class="space-y-3"></div>
        <button id="add-device-button" class="mt-5 w-full rounded-2xl bg-cyan-400 px-4 py-4 font-bold text-slate-950">+ Создать устройство</button>
    </main>

    <div id="add-device-modal" class="fixed inset-0 hidden items-end bg-black/70 p-4">
        <div class="mx-auto w-full max-w-xl rounded-3xl bg-slate-900 p-5"><h2 class="mb-4 text-xl font-bold">← Новое устройство</h2><label class="text-sm text-slate-400">Выберите сервер</label><div id="server-list" class="my-3 space-y-2"></div><label class="text-sm text-slate-400">Название устройства</label><input id="device-name" class="mt-2 w-full rounded-2xl bg-slate-800 p-4 outline-none" placeholder="📱 iPhone, 💻 Laptop"><div class="mt-4 grid grid-cols-2 gap-2"><button data-close="add-device-modal" class="rounded-2xl bg-slate-800 p-4">Отмена</button><button id="create-device-button" class="rounded-2xl bg-cyan-400 p-4 font-bold text-slate-950">Создать</button></div></div>
    </div>

    <div id="qr-code-modal" class="fixed inset-0 hidden items-center justify-center bg-black/70 p-4"><div class="w-full max-w-sm rounded-3xl bg-white p-5 text-slate-900"><h2 class="mb-2 text-xl font-bold">📱 QR-код</h2><p class="mb-4 text-sm text-slate-500">Отсканируйте в AmneziaVPN</p><div id="qr-code" class="flex justify-center"></div><button data-close="qr-code-modal" class="mt-4 w-full rounded-2xl bg-slate-900 p-3 text-white">Закрыть</button></div></div>
    <div id="share-link-modal" class="fixed inset-0 hidden items-center justify-center bg-black/70 p-4"><div class="w-full max-w-sm rounded-3xl bg-slate-900 p-5"><h2 class="mb-3 text-xl font-bold">🔗 Временная ссылка</h2><input id="share-link-input" class="mb-3 w-full rounded-xl bg-slate-800 p-3" readonly><button id="copy-share-link-button" class="w-full rounded-2xl bg-cyan-400 p-3 font-bold text-slate-950">Скопировать</button><button data-close="share-link-modal" class="mt-2 w-full rounded-2xl bg-slate-800 p-3">Закрыть</button></div></div>
    <div id="config-text-modal" class="fixed inset-0 hidden items-center justify-center bg-black/70 p-4"><div class="w-full max-w-sm rounded-3xl bg-slate-900 p-5 text-slate-100"><h2 class="mb-3 text-xl font-bold">VPN Конфиг</h2><pre id="config-text" class="mb-3 w-full rounded-xl bg-slate-800 p-3 overflow-auto"></pre><button id="copy-config-button" class="w-full rounded-2xl bg-cyan-400 p-3 font-bold text-slate-950">Скопировать весь текст</button><button data-close="config-text-modal" class="mt-2 w-full rounded-2xl bg-slate-800 p-3">Закрыть</button></div></div>

<script>
const tg = window.Telegram?.WebApp;
const userId = tg?.initDataUnsafe?.user?.id || new URLSearchParams(location.search).get('user_id');
let selectedServerId = null;
let dashboard = null;

function api(path, options = {}) {
    const headers = {
        'Content-Type': 'application/json',
        'X-TG-User-Id': userId,
        'X-Telegram-Init-Data': tg?.initData || '',
        ...(options.headers || {})
    };
    return fetch(path, { ...options, headers });
}

function fmtDate(value) { return value ? new Date(value).toLocaleDateString('ru-RU') : '—'; }
function toast(text) { if (tg?.showAlert) tg.showAlert(text); else alert(text); }

async function copy(text) {
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            toast('Скопировано в буфер');
            return;
        }
    } catch (e) {}
    
    const el = document.createElement('textarea');
    el.value = text;
    el.setAttribute('readonly', '');
    el.style.position = 'absolute';
    el.style.left = '-9999px';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Скопировано (совместимый режим)');
}

async function downloadConfig(id) {
    const d = dashboard.devices.find(x => x.id === id);
    const blob = new Blob([d.config_text], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${d.name}.conf`;
    a.click();
    URL.revokeObjectURL(a.href);

    // Проверка, если скачивание не сработало или на мобильном устройстве
    if (!a.download || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        document.getElementById('config-text').textContent = d.config_text;
        openModal('config-text-modal');
    }
}

function showQr(text) {
    const node = document.getElementById('qr-code');
    node.innerHTML = '';
    new QRCode(node, text);
    openModal('qr-code-modal');
}

async function shareDevice(id) {
    const data = await (await api(`/api/devices/${id}/share`, {method:'POST'})).json();
    document.getElementById('share-link-input').value = data.share_url;
    openModal('share-link-modal');
}

async function renameDevice(id, oldName) {
    const name = prompt('Новое название устройства', oldName);
    if (!name) return;
    await api(`/api/devices/${id}`, {method:'PATCH', body: JSON.stringify({name})});
    await loadDashboard();
}

async function deleteDevice(id) {
    if (!confirm('Удалить устройство? Это действие нельзя отменить.')) return;
    await api(`/api/devices/${id}`, {method:'DELETE'});
    await loadDashboard();
}

document.getElementById('add-device-button').onclick = async () => {
    await loadServers();
    openModal('add-device-modal');
};

document.getElementById('create-device-button').onclick = async () => {
    const name = document.getElementById('device-name').value.trim();
    if (!selectedServerId || !name) return toast('Выберите сервер и введите название');
    const res = await api('/api/devices', {method:'POST', body: JSON.stringify({server_id:selectedServerId, name})});
    if (!res.ok) return toast((await res.json()).error || 'Ошибка создания');
    closeModal('add-device-modal');
    await loadDashboard();
};

document.getElementById('refresh-button').onclick = loadDashboard;
document.getElementById('copy-share-link-button').onclick = () => copy(document.getElementById('share-link-input').value);
document.getElementById('copy-config-button').onclick = () => copy(document.getElementById('config-text').textContent);
document.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeModal(b.dataset.close));

loadDashboard();
</script>
</body>
</html>
